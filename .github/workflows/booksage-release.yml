name: BookSage Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: tamara1031
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push API
        uses: docker/build-push-action@v6
        with:
          context: booksage
          file: booksage/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/booksage-api:${{ github.ref_name }},${{ env.REGISTRY }}/booksage-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Worker
        uses: docker/build-push-action@v6
        with:
          context: booksage
          file: booksage/worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/booksage-worker:${{ github.ref_name }},${{ env.REGISTRY }}/booksage-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
